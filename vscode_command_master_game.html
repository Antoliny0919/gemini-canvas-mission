<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSCode Command Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap');
        
        body {
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Fira Code', monospace;
            overflow: hidden;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background-color: #252526;
            border: 1px solid #3e3e42;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            border-radius: 8px;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(30, 30, 30, 0.9);
            z-index: 10;
            border-radius: 8px;
        }

        .hidden { display: none !important; }

        #input-display {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            color: #9cdcfe;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 4px;
            pointer-events: none;
            border: 1px solid #4fc1ff;
            backdrop-filter: blur(4px);
            z-index: 30;
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- UI Layer -->
    <div id="ui-layer" class="absolute top-0 left-0 w-full p-4 flex justify-between items-start pointer-events-none z-20">
        <div>
            <div class="text-sm opacity-70">SCORE</div>
            <div id="score-val" class="text-2xl font-bold text-blue-400">0000</div>
        </div>
        <div class="w-1/3">
            <div class="text-sm opacity-70 text-right">HP</div>
            <div class="w-full bg-gray-700 h-4 rounded-full mt-1 overflow-hidden">
                <div id="hp-bar" class="bg-red-500 h-full transition-all duration-300" style="width: 100%"></div>
            </div>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="overlay">
        <h1 class="text-4xl font-bold mb-8 text-blue-400">VSCode Command Master</h1>
        
        <div class="bg-zinc-800 p-6 rounded-lg mb-8 w-80 border border-zinc-700">
            <p class="mb-4 text-center text-gray-300">OS 환경을 선택하세요</p>
            <div class="flex justify-around">
                <label class="flex items-center cursor-pointer group">
                    <input type="radio" name="os-select" value="mac" class="hidden peer" checked>
                    <div class="px-4 py-2 rounded border border-zinc-600 peer-checked:bg-blue-600 peer-checked:border-blue-400 group-hover:bg-zinc-700 transition">
                        macOS
                    </div>
                </label>
                <label class="flex items-center cursor-pointer group">
                    <input type="radio" name="os-select" value="win" class="hidden peer">
                    <div class="px-4 py-2 rounded border border-zinc-600 peer-checked:bg-blue-600 peer-checked:border-blue-400 group-hover:bg-zinc-700 transition">
                        Windows
                    </div>
                </label>
            </div>
        </div>

        <button id="start-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-10 py-3 rounded-full font-bold transition-all transform hover:scale-105">
            게임 시작
        </button>
        
        <div class="mt-10 text-xs text-gray-500 text-center leading-relaxed">
            하늘에서 떨어지는 명령어 설명을 보고 알맞은 단축키를 입력하세요.<br>
            <span class="text-blue-300 font-bold">⌨️ 입력을 잘못했다면 'Backspace'를 눌러 초기화하세요!</span><br>
            <span class="text-zinc-400">바닥에 닿기 직전에 힌트와 함께 박스가 확장됩니다.</span>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="overlay hidden">
        <h2 class="text-5xl font-bold text-red-500 mb-2">GAME OVER</h2>
        <p id="final-score" class="text-2xl mb-8 text-gray-300">최종 점수: 0</p>
        <button id="restart-btn" class="bg-zinc-600 hover:bg-zinc-500 text-white px-8 py-2 rounded-lg transition">
            다시 시도
        </button>
    </div>

    <!-- Current Key Display -->
    <div id="input-display" class="hidden"></div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const COMMANDS = [
        { desc: "파일 저장 (Save)", mac: "cmd+s", win: "ctrl+s" },
        { desc: "커맨드 팔레트 (Command Palette)", mac: "cmd+shift+p", win: "ctrl+shift+p" },
        { desc: "빠른 열기 (Quick Open)", mac: "cmd+p", win: "ctrl+p" },
        { desc: "전체 검색 (Search)", mac: "cmd+shift+f", win: "ctrl+shift+f" },
        { desc: "터미널 토글 (Toggle Terminal)", mac: "ctrl+`", win: "ctrl+`" },
        { desc: "사이드바 토글 (Toggle Sidebar)", mac: "cmd+b", win: "ctrl+b" },
        { desc: "한 줄 삭제 (Delete Line)", mac: "cmd+shift+k", win: "ctrl+shift+k" },
        { desc: "정의로 이동 (Go to Definition)", mac: "f12", win: "f12" },
        { desc: "심볼 이름 변경 (Rename Symbol)", mac: "f2", win: "f2" },
        { desc: "새 창 열기 (New Window)", mac: "cmd+shift+n", win: "ctrl+shift+n" },
        { desc: "파일 탐색기 (Explorer)", mac: "cmd+shift+e", win: "ctrl+shift+e" },
        { desc: "줄 이동 (Go to Line)", mac: "ctrl+g", win: "ctrl+g" },
        { desc: "코드 포맷 (Format Document)", mac: "shift+alt+f", win: "shift+alt+f" },
        { desc: "주석 처리 (Toggle Comment)", mac: "cmd+/", win: "ctrl+/" },
        { desc: "복사 (Copy)", mac: "cmd+c", win: "ctrl+c" },
        { desc: "붙여넣기 (Paste)", mac: "cmd+v", win: "ctrl+v" },
        { desc: "실행 취소 (Undo)", mac: "cmd+z", win: "ctrl+z" }
    ];

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');
    const scoreVal = document.getElementById('score-val');
    const hpBar = document.getElementById('hp-bar');
    const inputDisplay = document.getElementById('input-display');
    const finalScoreTxt = document.getElementById('final-score');

    let gameState = 'START';
    let selectedOS = 'mac';
    let score = 0;
    let hp = 100;
    let items = [];
    let particles = [];
    let activeKeys = new Set();
    let spawnTimer = 0;
    let baseSpeed = 0.8;
    let lastTime = 0;

    function init() {
        resize();
        window.addEventListener('resize', resize);
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        
        document.getElementById('start-btn').onclick = startGame;
        document.getElementById('restart-btn').onclick = () => {
            gameOverScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
        };

        requestAnimationFrame(gameLoop);
    }

    function resize() {
        const container = document.getElementById('game-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
    }

    function startGame() {
        selectedOS = document.querySelector('input[name="os-select"]:checked').value;
        score = 0;
        hp = 100;
        items = [];
        particles = [];
        baseSpeed = 0.8;
        activeKeys.clear();
        updateUI();
        
        startScreen.classList.add('hidden');
        gameState = 'PLAYING';
    }

    function gameOver() {
        gameState = 'GAMEOVER';
        finalScoreTxt.innerText = `최종 점수: ${score}`;
        gameOverScreen.classList.remove('hidden');
        activeKeys.clear();
        updateInputDisplay();
    }

    function handleKeyDown(e) {
        if (gameState !== 'PLAYING') return;
        
        // 백스페이스 입력 시 입력 커맨드 초기화
        if (e.key === 'Backspace') {
            e.preventDefault();
            activeKeys.clear();
            updateInputDisplay();
            return;
        }

        // 시스템 기본 단축키 방지
        if (e.ctrlKey || e.metaKey || e.altKey || e.key.startsWith('F')) {
            e.preventDefault();
        }

        const key = e.key.toLowerCase();
        activeKeys.add(key);
        updateInputDisplay();
        checkShortcut();
    }

    function handleKeyUp(e) {
        const key = e.key.toLowerCase();
        activeKeys.delete(key);
        updateInputDisplay();
    }

    function updateInputDisplay() {
        if (activeKeys.size === 0) {
            inputDisplay.classList.add('hidden');
            return;
        }
        
        inputDisplay.classList.remove('hidden');
        const keys = Array.from(activeKeys).map(k => formatKeyName(k));
        inputDisplay.innerText = keys.join(' + ');
    }

    function formatKeyName(k) {
        if (k === ' ') return 'space';
        if (k === 'meta') return 'cmd';
        if (k === 'control') return 'ctrl';
        return k;
    }

    function checkShortcut() {
        const currentInput = Array.from(activeKeys).map(k => formatKeyName(k));

        for (let i = items.length - 1; i >= 0; i--) {
            const item = items[i];
            const targetStr = item.shortcut[selectedOS];
            const targetParts = targetStr.split('+');
            
            const isMatch = targetParts.every(p => currentInput.includes(p)) && 
                            targetParts.length === currentInput.length;

            if (isMatch) {
                createExplosion(item.x + item.w/2, item.y + item.targetH/2, '#4fc1ff');
                items.splice(i, 1);
                score += 100;
                baseSpeed += 0.01;
                updateUI();
                break;
            }
        }
    }

    function createExplosion(x, y, color) {
        for (let i = 0; i < 15; i++) {
            particles.push({
                x, y,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10,
                life: 1.0,
                color
            });
        }
    }

    function spawnItem() {
        const cmd = COMMANDS[Math.floor(Math.random() * COMMANDS.length)];
        const width = 240;
        const x = Math.random() * (canvas.width - width - 40) + 20;
        
        items.push({
            desc: cmd.desc,
            shortcut: cmd,
            answer: cmd[selectedOS],
            x: x,
            y: -80,
            w: width,
            currentH: 50, // 시작 높이 (힌트 없음)
            targetH: 50,  // 목표 높이
            speed: (Math.random() * 0.3 + 0.6) * baseSpeed,
            revealed: false
        });
    }

    function updateUI() {
        scoreVal.innerText = score.toString().padStart(4, '0');
        hpBar.style.width = `${hp}%`;
        hpBar.style.backgroundColor = hp <= 30 ? '#ef4444' : '#22c55e';
    }

    function gameLoop(timestamp) {
        const deltaTime = timestamp - lastTime;
        lastTime = timestamp;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (gameState === 'PLAYING') {
            spawnTimer += deltaTime;
            const spawnRate = Math.max(1200, 3000 - (score / 5));
            if (spawnTimer > spawnRate) {
                spawnItem();
                spawnTimer = 0;
            }

            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                item.y += item.speed;

                // 힌트 활성화 여부 확인 (화면 90% 지점 도달 시)
                const revealThreshold = canvas.height * 0.9;
                if (!item.revealed && (item.y + item.currentH >= revealThreshold)) {
                    item.revealed = true;
                    item.targetH = 75; // 힌트가 나타날 때 박스 크기 확장
                }

                // 박스 높이 애니메이션 (부드럽게 확장)
                if (item.currentH < item.targetH) {
                    item.currentH += 2;
                }

                // 상자 그리기
                ctx.fillStyle = '#2d2d2d';
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                roundRect(ctx, item.x, item.y, item.w, item.currentH, 8, true);
                
                ctx.shadowBlur = 0;
                ctx.strokeStyle = item.revealed ? '#f59e0b' : '#4fc1ff';
                ctx.lineWidth = 2;
                roundRect(ctx, item.x, item.y, item.w, item.currentH, 8, false);

                // 설명 텍스트
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 14px "Fira Code"';
                ctx.textAlign = 'center';
                ctx.fillText(item.desc, item.x + item.w/2, item.y + 32);

                // 힌트 텍스트 (박스가 확장된 상태에서만 표시)
                if (item.revealed && item.currentH >= 70) {
                    ctx.fillStyle = '#f59e0b';
                    ctx.font = 'bold 13px "Fira Code"';
                    ctx.fillText(`[ ${item.answer} ]`, item.x + item.w/2, item.y + 58);
                }

                if (item.y > canvas.height) {
                    items.splice(i, 1);
                    hp -= 10;
                    updateUI();
                    if (hp <= 0) gameOver();
                }
            }
        }

        // 파티클 업데이트
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.02;
            if (p.life <= 0) particles.splice(i, 1);
            else {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        requestAnimationFrame(gameLoop);
    }

    function roundRect(ctx, x, y, width, height, radius, fill) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
        if (fill) ctx.fill();
        else ctx.stroke();
    }

    window.onload = init;
</script>

</body>
</html>
