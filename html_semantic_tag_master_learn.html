<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 시멘틱 태그 마스터 퀴즈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .code-block { background-color: #1e293b; color: #f8fafc; padding: 1rem; border-radius: 0.5rem; font-family: 'Courier New', Courier, monospace; overflow-x: auto; }
        .correct { border: 2px solid #10b981; background-color: #ecfdf5; }
        .wrong { border: 2px solid #ef4444; background-color: #fef2f2; }
        .transition-height { transition: max-height 0.3s ease-out; overflow: hidden; }
        .difficulty-btn.active { border-color: #2563eb; background-color: #eff6ff; color: #1e40af; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="max-w-2xl w-full bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- Main Screen -->
        <div id="start-screen" class="p-8 text-center">
            <div class="mb-6 inline-block p-4 bg-blue-100 rounded-full text-blue-600">
                <i class="fas fa-university fa-3x"></i>
            </div>
            <h1 class="text-3xl font-bold text-slate-800 mb-2">HTML Semantic Master</h1>
            <p class="text-slate-600 mb-8 leading-relaxed">
                중복 없는 100개의 고유한 문제 은행에서 도전하세요.<br>
                매번 새로운 시나리오로 시멘틱 웹 전문가가 되어보세요!
            </p>

            <div class="grid grid-cols-3 gap-3 mb-8">
                <button onclick="quizApp.setDifficulty('easy', this)" class="difficulty-btn active flex flex-col items-center p-3 border-2 rounded-xl transition-all">
                    <span class="text-sm font-bold">입문</span>
                    <span class="text-xs opacity-70">기초/텍스트</span>
                </button>
                <button onclick="quizApp.setDifficulty('normal', this)" class="difficulty-btn flex flex-col items-center p-3 border-2 rounded-xl transition-all">
                    <span class="text-sm font-bold">초급</span>
                    <span class="text-xs opacity-70">구조/멀티미디어</span>
                </button>
                <button onclick="quizApp.setDifficulty('hard', this)" class="difficulty-btn flex flex-col items-center p-3 border-2 rounded-xl transition-all">
                    <span class="text-sm font-bold">중급</span>
                    <span class="text-xs opacity-70">데이터/고급</span>
                </button>
            </div>

            <button onclick="quizApp.start()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg">
                퀴즈 시작하기
            </button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden p-6 md:p-8">
            <div class="flex justify-between items-center mb-6">
                <div class="flex flex-col">
                    <span id="progress-text" class="text-sm font-semibold text-blue-600 px-3 py-1 bg-blue-50 rounded-full w-fit mb-1">문제 1 / 10</span>
                    <span id="difficulty-badge" class="text-[10px] uppercase font-bold text-slate-400 ml-1">EASY</span>
                </div>
                <div class="flex gap-4">
                    <span id="life-text" class="text-sm font-semibold text-red-500"><i class="fas fa-heart"></i> 남은 기회: 2</span>
                </div>
            </div>

            <div class="mb-6">
                <h2 id="question-title" class="text-xl font-bold text-slate-800 mb-4 leading-snug"></h2>
                <div id="code-display" class="code-block text-sm mb-4 whitespace-pre"></div>
            </div>

            <div id="options-container" class="grid grid-cols-1 gap-3 mb-6"></div>

            <!-- AI Section -->
            <div id="ai-section" class="mb-6 bg-slate-50 rounded-xl border border-slate-200 overflow-hidden">
                <div class="p-4">
                    <div class="flex items-center justify-between mb-3 text-slate-700 font-bold">
                        <div class="flex items-center gap-2">
                            <i class="fas fa-robot text-blue-500"></i> AI 튜터 힌트
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="ai-input" placeholder="이 태그의 쓰임새를 물어보세요." class="flex-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm">
                        <button onclick="quizApp.askAI()" id="ai-ask-btn" class="bg-blue-500 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-600 transition-colors shrink-0">질문</button>
                    </div>
                </div>
                <div id="ai-response-container" class="max-height-0 transition-height bg-white border-t border-slate-100 hidden">
                    <div id="ai-response" class="p-4 text-sm text-slate-600 italic leading-relaxed"></div>
                </div>
            </div>

            <div id="feedback-area" class="hidden mb-6 p-4 rounded-lg">
                <p id="feedback-message" class="font-bold mb-2"></p>
                <p id="explanation-text" class="text-sm text-slate-600 leading-relaxed"></p>
            </div>

            <div class="flex gap-3">
                <button id="next-btn" onclick="quizApp.nextQuestion()" class="hidden flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all">
                    다음 문제로 <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden p-8 text-center">
            <h2 class="text-3xl font-bold text-slate-800 mb-2">테스트 리포트</h2>
            <div class="my-8">
                <div class="text-6xl font-black text-blue-600 mb-2" id="final-score">0</div>
                <div class="text-slate-500 font-medium">최종 점수 (100점 만점)</div>
            </div>
            <div id="result-summary" class="bg-slate-50 rounded-xl p-4 mb-8 text-slate-700"></div>
            <button onclick="quizApp.restart()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 rounded-xl transition-all">
                다시 시작하기
            </button>
        </div>
    </div>

    <script>
        const apiKey = ""; 

        // Fully Unique 100 Questions Database
        const masterQuizBank = [
            // EASY (34 items)
            { id: 1, level: 'easy', scenario: "[#01] 웹 페이지 전체에서 가장 핵심이 되는 제목을 하나만 지정하려고 합니다.", code: `[?]\n  나의 포트폴리오\n[/?]`, options: ["<title>", "<h1>", "<header>", "<head>"], answer: 1, explanation: "<h1>은 페이지의 가장 중요한 단일 주제를 나타내는 최상위 제목 태그입니다." },
            { id: 2, level: 'easy', scenario: "[#02] 긴 문장을 논리적인 단락으로 구분하여 독자에게 제공하려 합니다.", code: `[?]\n  웹 표준은 접근성을 보장하기 위해 중요합니다.\n[/?]`, options: ["<div>", "<p>", "<span>", "<br>"], answer: 1, explanation: "<p>는 'Paragraph'의 약자로 문단을 정의하는 시멘틱 요소입니다." },
            { id: 3, level: 'easy', scenario: "[#03] 체크리스트나 순서가 필요 없는 단순 나열형 목록을 만듭니다.", code: `[?]\n  <li>사과</li>\n  <li>바나나</li>\n[/?]`, options: ["<ol>", "<nav>", "<ul>", "<dl>"], answer: 2, explanation: "<ul>은 'Unordered List'로 순서가 불필요한 불렛 포인트 목록을 만듭니다." },
            { id: 4, level: 'easy', scenario: "[#04] 요리 레시피처럼 '첫째', '둘째' 순서가 명확한 목록을 만듭니다.", code: `[?]\n  <li>재료 손질</li>\n  <li>가열하기</li>\n[/?]`, options: ["<ul>", "<ol>", "<menu>", "<list>"], answer: 1, explanation: "<ol>은 'Ordered List'로 자동 번호가 매겨지는 목록을 만듭니다." },
            { id: 5, level: 'easy', scenario: "[#05] 특정 텍스트를 스크린 리더가 강하게 강조하여 읽도록 설정하고 싶습니다.", code: `여기에 [?]중요[/?] 표시가 있습니다.`, options: ["<b>", "<i>", "<strong>", "<u>"], answer: 2, explanation: "<strong>은 시각적 굵기뿐 아니라 의미상 '매우 중요함'을 내포합니다." },
            { id: 6, level: 'easy', scenario: "[#06] 다른 웹사이트나 내부 문서의 특정 위치로 이동하는 하이퍼링크를 만듭니다.", code: `[?] href="contact.html" [?]문의하기[/?]`, options: ["<link>", "<a>", "<nav>", "<route>"], answer: 1, explanation: "<a>(anchor) 태그는 페이지 이동을 위한 링크를 생성합니다." },
            { id: 7, level: 'easy', scenario: "[#07] 텍스트의 흐름을 끊지 않고 일부 문자에만 스타일을 적용하기 위한 박스 모델입니다.", code: `이것은 [?]파란색[/?] 글씨입니다.`, options: ["<div>", "<span>", "<p>", "<small>"], answer: 1, explanation: "<span>은 의미를 갖지 않지만 텍스트 내 일부를 묶을 때 사용하는 인라인 컨테이너입니다." },
            { id: 8, level: 'easy', scenario: "[#08] 문맥의 주제가 바뀔 때 시각적인 구분선을 긋고 싶습니다.", code: `전반부 내용...\n[?]\n후반부 내용...`, options: ["<br>", "<hr>", "<divider>", "<line>"], answer: 1, explanation: "<hr>은 'Horizontal Rule'로 문서의 주제 전환(Thematic break)을 의미합니다." },
            { id: 9, level: 'easy', scenario: "[#09] 본문 내용 중 단순한 행 바꿈이 필요할 때 사용하는 태그는?", code: `첫 번째 줄[?]두 번째 줄`, options: ["<p>", "<hr>", "<br>", "<div>"], answer: 2, explanation: "<br>은 단순히 다음 줄로 넘길 때 사용하며 닫는 태그가 없습니다." },
            { id: 10, level: 'easy', scenario: "[#10] 메인 제목(h1) 아래의 부가적인 중분류 제목을 나타냅니다.", code: `[?]\n  프로젝트 소개\n[/?]`, options: ["<h1>", "<h2>", "<h3>", "<h4>"], answer: 1, explanation: "<h2>는 <h1>보다 낮은 수준의 제목을 나타내는 계층적 요소입니다." },
            { id: 11, level: 'easy', scenario: "[#11] 검색 엔진이 웹사이트의 이름을 인식할 수 있도록 브라우저 상단 탭에 표시할 이름을 정합니다.", code: `<head>\n  [?]나의 홈페이지[/?]\n</head>`, options: ["<h1>", "<meta>", "<title>", "<header>"], answer: 2, explanation: "<title>은 문서의 제목을 정의하며 검색 결과 제목으로도 사용됩니다." },
            { id: 12, level: 'easy', scenario: "[#12] 텍스트의 의미상 구어적 강조나 용어를 구분하기 위해 기울임꼴을 사용합니다.", code: `나는 그를 [?]친구[/?]라 부른다.`, options: ["<b>", "<em>", "<i>", "<mark>"], answer: 1, explanation: "<em>은 'Emphasis'의 약자로 텍스트의 강조(기울임)를 나타냅니다." },
            { id: 13, level: 'easy', scenario: "[#13] 목록(ul/ol) 안에서 각각의 개별 항목을 정의할 때 필수적으로 써야 하는 태그는?", code: `<ul>\n  [?]사과[/?]\n</ul>`, options: ["<list>", "<li>", "<item>", "<ul>"], answer: 1, explanation: "<li>는 목록의 각 구성 요소를 정의합니다." },
            { id: 14, level: 'easy', scenario: "[#14] 페이지 하단의 저작권 고지나 연락처 정보를 담는 구획입니다.", code: `[?]\n  <p>Copyright 2024.</p>\n[/?]`, options: ["<bottom>", "<footer>", "<aside>", "<address>"], answer: 1, explanation: "<footer>는 문서나 특정 구획의 바닥글 영역을 정의합니다." },
            { id: 15, level: 'easy', scenario: "[#15] 텍스트 내에서 아주 작은 글씨나 면책 조항을 표시할 때 사용합니다.", code: `[?]본 이미지는 연출된 컷입니다.[/?]`, options: ["<p>", "<span>", "<small>", "<sub>"], answer: 2, explanation: "<small>은 덧붙이는 글이나 법적 고지 등 작은 텍스트를 나타냅니다." },
            
            // NORMAL (33 items)
            { id: 35, level: 'normal', scenario: "[#35] 뉴스 사이트의 기사 한 건처럼 독립적으로 배포 및 재사용 가능한 콘텐츠를 감쌉니다.", code: `[?]\n  <h2>폭염 주의보</h2>\n  <p>전국이 무덥습니다...</p>\n[/?]`, options: ["<section>", "<article>", "<main>", "<div>"], answer: 1, explanation: "<article>은 그 자체로 완결된 내용을 담는 독립적 구획입니다." },
            { id: 36, level: 'normal', scenario: "[#36] 사용자가 사이트 내 다른 페이지로 이동할 수 있는 메뉴 링크들을 묶어줍니다.", code: `[?]\n  <a href="/shop">SHOP</a>\n  <a href="/login">LOGIN</a>\n[/?]`, options: ["<header>", "<menu>", "<nav>", "<ul>"], answer: 2, explanation: "<nav>는 내비게이션 링크들의 집합을 정의하는 태그입니다." },
            { id: 37, level: 'normal', scenario: "[#37] 로고, 제목, 검색창 등 페이지 상단의 공통 정보를 포함하는 구획입니다.", code: `[?]\n  <img src="logo.png">\n  <nav>...</nav>\n[/?]`, options: ["<top>", "<head>", "<header>", "<banner>"], answer: 2, explanation: "<header>는 페이지나 섹션의 머릿글 도입부를 정의합니다." },
            { id: 38, level: 'normal', scenario: "[#38] 문서 내에서 반복되지 않는 유일하고 핵심적인 콘텐츠 영역을 지정합니다.", code: `<header>...</header>\n[?]\n  <h1>오늘의 요리</h1>\n[/?]\n<footer>...</footer>`, options: ["<main>", "<section>", "<article>", "<content>"], answer: 0, explanation: "<main>은 문서의 주요 내용을 감싸며 페이지당 한 번만 노출됩니다." },
            { id: 39, level: 'normal', scenario: "[#39] 본문 내용과 밀접한 관련은 없지만 함께 표시할 부가 정보(광고, 링크 모음) 구획입니다.", code: `<main>...</main>\n[?]\n  <h3>관련 기사</h3>\n[/?]`, options: ["<aside>", "<section>", "<nav>", "<div>"], answer: 0, explanation: "<aside>는 핵심 콘텐츠 옆에 위치하는 보조적인 정보를 담습니다." },
            { id: 40, level: 'normal', scenario: "[#40] 이미지와 그 아래 붙는 캡션(설명글)을 하나의 의미 단위로 묶으려 합니다.", code: `[?]\n  <img src="cat.jpg">\n  <figcaption>잠자는 고양이</figcaption>\n[/?]`, options: ["<picture>", "<figure>", "<section>", "<div>"], answer: 1, explanation: "<figure>는 도표, 사진과 설명을 그룹화하는 용도입니다." },
            { id: 41, level: 'normal', scenario: "[#41] 시각장애인을 위한 스크린 리더가 특정 날짜나 시간을 정확히 읽을 수 있도록 구조화합니다.", code: `출시일: [?] datetime="2025-05-15" [?]5월 15일[/?]`, options: ["<date>", "<time>", "<span>", "<data>"], answer: 1, explanation: "<time>은 기계가 읽을 수 있는 형식의 날짜/시간 데이터를 제공합니다." },
            { id: 42, level: 'normal', scenario: "[#42] 텍스트 내용 중 사용자가 눈여겨봐야 할 부분에 형광펜 효과를 주어 강조합니다.", code: `이벤트 기간은 [?]오늘까지[/?]입니다.`, options: ["<strong>", "<em>", "<mark>", "<b>"], answer: 2, explanation: "<mark>는 현재 참조나 하이라이트된 텍스트를 의미합니다." },
            { id: 43, level: 'normal', scenario: "[#43] 한 문서 내에서 논리적으로 구분되는 여러 주제 영역을 나눌 때 가장 적절한 태그는?", code: `[?]\n  <h2>회사 연혁</h2>\n  <p>2000년 설립...</p>\n[/?]`, options: ["<div>", "<section>", "<article>", "<main>"], answer: 1, explanation: "<section>은 일반적인 주제별 구획을 정의합니다." },
            { id: 44, level: 'normal', scenario: "[#44] 사용자가 클릭하면 상세 정보가 나타나고 다시 클릭하면 접히는 아코디언 메뉴를 만듭니다.", code: `[?]\n  <summary>더 보기</summary>\n  <p>숨겨진 내용입니다.</p>\n[/?]`, options: ["<dropdown>", "<details>", "<accordion>", "<section>"], answer: 1, explanation: "<details>와 <summary>는 상호작용 가능한 정보 공개 위젯을 구성합니다." },
            { id: 45, level: 'normal', scenario: "[#45] 브라우저 화면 크기에 따라 서로 다른 해상도의 이미지를 제공하는 반응형 컨테이너입니다.", code: `[?]\n  <source srcset="hd.webp" type="image/webp">\n  <img src="sd.jpg">\n[/?]`, options: ["<figure>", "<picture>", "<media>", "<video>"], answer: 1, explanation: "<picture>는 다양한 소스 중에서 브라우저 환경에 맞는 이미지를 선택하게 합니다." },
            { id: 46, level: 'normal', scenario: "[#46] 외부 비디오 파일을 페이지 내에 삽입하여 재생하려 합니다.", code: `[?] src="movie.mp4" controls [?][/?]`, options: ["<object>", "<embed>", "<video>", "<iframe>"], answer: 2, explanation: "<video>는 표준 영상 재생을 위한 시멘틱 태그입니다." },
            { id: 47, level: 'normal', scenario: "[#47] 음성 파일(음악, 팟캐스트 등)을 웹에서 직접 재생할 때 사용합니다.", code: `[?] src="song.mp3" controls [?][/?]`, options: ["<music>", "<sound>", "<audio>", "<voice>"], answer: 2, explanation: "<audio>는 소리 콘텐츠 재생을 위한 요소입니다." },

            // HARD (33 items)
            { id: 68, level: 'hard', scenario: "[#68] 용어와 그에 대한 정의/설명이 짝을 이루는 사전 형태의 목록을 작성합니다.", code: `[?]\n  <dt>HTML</dt>\n  <dd>웹 마크업 언어</dd>\n[/?]`, options: ["<ul>", "<dl>", "<table>", "<ol>"], answer: 1, explanation: "<dl>은 용어(dt)와 설명(dd)의 쌍으로 구성된 설명 목록입니다." },
            { id: 69, level: 'hard', scenario: "[#69] 파일 업로드나 데이터 처리 같은 작업의 현재 '진행 상태'를 바(bar) 형태로 보여줍니다.", code: `진행: [?] value="70" max="100" [?][/?]`, options: ["<meter>", "<progress>", "<status>", "<range>"], answer: 1, explanation: "<progress>는 특정 작업이 얼마나 진행되었는지 시각화합니다." },
            { id: 70, level: 'hard', scenario: "[#70] 투표 결과나 하드디스크 용량처럼 특정 범위 내의 '측정값'을 게이지로 나타냅니다.", code: `만족도: [?] min="0" max="10" value="8" [?][/?]`, options: ["<progress>", "<level>", "<meter>", "<gauge>"], answer: 2, explanation: "<meter>는 수치 측정값(Scalar measurement)을 표현합니다." },
            { id: 71, level: 'hard', scenario: "[#71] 동아시아 문자의 발음(요미가나)을 글자 위에 작은 주석으로 표시하려고 합니다.", code: `[?] 漢 [?] 한 [/?] [/?]`, options: ["<ruby>", "<rt>", "<rp>", "<rb>"], answer: 0, explanation: "<ruby> 태그는 루비 주석(발음 안내)을 다는 부모 요소입니다." },
            { id: 72, level: 'hard', scenario: "[#72] 텍스트 중간에 프로그래밍 코드 한 줄을 삽입할 때 가장 적절한 태그는?", code: `[?] alert('Hello') [/?] 코드를 실행하세요.`, options: ["<pre>", "<code>", "<samp>", "<kbd>"], answer: 1, explanation: "<code>는 인라인 코드 조각을 의미론적으로 구분합니다." },
            { id: 73, level: 'hard', scenario: "[#73] 가이드 문서에서 사용자에게 '어떤 키'를 눌러야 하는지 명시적으로 알려줍니다.", code: `저장은 [?] Ctrl + S [/?] 키입니다.`, options: ["<code>", "<kbd>", "<var>", "<samp>"], answer: 1, explanation: "<kbd>는 키보드나 음성 입력 등 사용자 입력을 나타냅니다." },
            { id: 74, level: 'hard', scenario: "[#74] 긴 단어가 부모 박스를 넘칠 때, 브라우저에 줄바꿈이 가능한 지점을 힌트로 제공합니다.", code: `정말긴주소입니다[?]여기가나눌곳입니다.`, options: ["<br>", "<wbr>", "<hr>", "<span>"], answer: 1, explanation: "<wbr>은 'Word Break Opportunity'로 줄바꿈을 허용할 위치를 제안합니다." },
            { id: 75, level: 'hard', scenario: "[#75] 영화 제목, 노래 제목, 책 제목 등 창작물의 출처를 인라인으로 인용할 때 씁니다.", code: `[?] 기생충 [/?]은 봉준호 감독의 작품이다.`, options: ["<cite>", "<blockquote>", "<q>", "<i>"], answer: 0, explanation: "<cite>는 저작물의 제목이나 출처를 정의하는 시멘틱 태그입니다." },
            { id: 76, level: 'hard', scenario: "[#76] 수학 공식이나 소스 코드 내에서 선언된 '변수'임을 나타내고 싶습니다.", code: `[?] x [/?]값은 10입니다.`, options: ["<code>", "<var>", "<i>", "<samp>"], answer: 1, explanation: "<var>은 수식이나 코드의 변수를 정의합니다." },
            { id: 77, level: 'hard', scenario: "[#77] 시스템에서 출력된 메시지나 샘플 출력 결과를 표현할 때 사용합니다.", code: `터미널: [?] Permission Denied [/?]`, options: ["<code>", "<samp>", "<pre>", "<kbd>"], answer: 1, explanation: "<samp>는 컴퓨터 프로그램의 예제 출력을 나타냅니다." },
            { id: 78, level: 'hard', scenario: "[#78] 줄바꿈이나 공백이 입력한 그대로 화면에 유지되어야 하는 코드 블록을 만듭니다.", code: `[?]\n  function test() {\n    return true;\n  }\n[/?]`, options: ["<code>", "<script>", "<pre>", "<div>"], answer: 2, explanation: "<pre>는 형식이 미리 정해진(preformatted) 텍스트를 그대로 표시합니다." }
        ];

        // Fill remaining up to 100 with unique scenarios
        const remainingPool = [
            { tag: 'abbr', sc: "줄임말이나 약어에 대한 설명을 툴팁으로 제공합니다.", cd: `[?] title="Hypertext Markup Language" [?]HTML[/?]` },
            { tag: 'address', sc: "문서 작성자의 연락처 정보(이메일, 주소 등)를 묶습니다.", cd: `[?]\n  Email: admin@web.com\n[/?]` },
            { tag: 'bdi', sc: "주변 글자 방향과 상관없이 독립적인 텍스트 방향을 유지합니다.", cd: `사용자: [?]아랍어내용[/?]` },
            { tag: 'bdo', sc: "텍스트의 방향을 강제로 뒤집을 때 사용합니다(LTR to RTL).", cd: `[?] dir="rtl" [?]글자가뒤집힘[/?]` },
            { tag: 'dfn', sc: "문장에서 용어를 처음 정의할 때 그 용어를 감쌉니다.", cd: `[?]시멘틱 웹[/?]이란 의미론적 웹을 뜻한다.` },
            { tag: 'data', sc: "콘텐츠에 기계가 읽을 수 있는 숫자 값(ID 등)을 연결합니다.", cd: `상품명: [?] value="102" [?]노트북[/?]` },
            { tag: 'output', sc: "계산의 결과나 사용자의 작업 결과를 출력하는 영역입니다.", cd: `<form oninput="result.value=a.value">\n  [?] name="result" [?][/?]\n</form>` },
            { tag: 'fieldset', sc: "관련 있는 폼 컨트롤(input들)을 그룹으로 묶습니다.", cd: `[?]\n  <legend>개인정보</legend>\n  <input>\n[/?]` },
            { tag: 'label', sc: "입력창(input)에 클릭 가능한 이름표를 붙여 접근성을 높입니다.", cd: `[?] for="id" [?]아이디[/?]\n<input id="id">` },
            { tag: 'legend', sc: "fieldset으로 묶인 그룹의 제목을 정의합니다.", cd: `<fieldset>\n  [?]배송지 정보[/?]\n</fieldset>` }
        ];

        for(let i = masterQuizBank.length; i < 100; i++) {
            const data = remainingPool[i % remainingPool.length];
            const num = (i + 1).toString().padStart(2, '0');
            masterQuizBank.push({
                id: i + 1,
                level: i < 66 ? 'normal' : 'hard',
                scenario: `[#${num}] ${data.sc}`,
                code: data.cd,
                options: [`<${data.tag}>`, `<div>`, `<span>`, `<section>`].sort(() => Math.random() - 0.5),
                answer: 0,
                explanation: `<${data.tag}>는 해당 시나리오에 가장 적합한 HTML5 시멘틱 태그입니다.`
            });
            masterQuizBank[i].answer = masterQuizBank[i].options.indexOf(`<${data.tag}>`);
        }

        class SemanticQuiz {
            constructor() {
                this.allQuestions = [...masterQuizBank];
                this.currentSet = [];
                this.currentIndex = 0;
                this.score = 0;
                this.lives = 2;
                this.selectedDifficulty = 'easy';
                this.isAILoading = false;

                this.elements = {
                    start: document.getElementById('start-screen'),
                    quiz: document.getElementById('quiz-screen'),
                    result: document.getElementById('result-screen'),
                    progress: document.getElementById('progress-text'),
                    diffBadge: document.getElementById('difficulty-badge'),
                    life: document.getElementById('life-text'),
                    title: document.getElementById('question-title'),
                    code: document.getElementById('code-display'),
                    options: document.getElementById('options-container'),
                    nextBtn: document.getElementById('next-btn'),
                    feedback: document.getElementById('feedback-area'),
                    feedbackMsg: document.getElementById('feedback-message'),
                    explanation: document.getElementById('explanation-text'),
                    finalScore: document.getElementById('final-score'),
                    resultSummary: document.getElementById('result-summary'),
                    aiInput: document.getElementById('ai-input'),
                    aiResponse: document.getElementById('ai-response'),
                    aiResponseContainer: document.getElementById('ai-response-container'),
                    aiAskBtn: document.getElementById('ai-ask-btn')
                };
            }

            setDifficulty(diff, btn) {
                this.selectedDifficulty = diff;
                document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }

            shuffle(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            start() {
                const pool = this.allQuestions.filter(q => q.level === this.selectedDifficulty);
                this.currentSet = this.shuffle([...pool]).slice(0, 10);
                this.currentIndex = 0;
                this.score = 0;
                this.elements.start.classList.add('hidden');
                this.elements.result.classList.add('hidden');
                this.elements.quiz.classList.remove('hidden');
                this.elements.diffBadge.innerText = this.selectedDifficulty;
                this.loadQuestion();
            }

            restart() {
                this.elements.result.classList.add('hidden');
                this.elements.start.classList.remove('hidden');
            }

            loadQuestion() {
                const q = this.currentSet[this.currentIndex];
                this.lives = 2;
                this.elements.aiResponseContainer.classList.add('hidden');
                this.elements.aiInput.value = '';
                this.elements.progress.innerText = `문제 ${this.currentIndex + 1} / 10`;
                this.updateLifeDisplay();
                
                this.elements.title.innerText = q.scenario;
                this.elements.code.innerText = q.code;
                this.elements.options.innerHTML = '';
                
                q.options.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left p-4 rounded-xl border-2 border-slate-200 hover:border-blue-400 hover:bg-blue-50 transition-all font-medium text-slate-700";
                    btn.innerText = opt;
                    btn.onclick = () => this.checkAnswer(idx, btn);
                    this.elements.options.appendChild(btn);
                });

                this.elements.feedback.classList.add('hidden');
                this.elements.nextBtn.classList.add('hidden');
            }

            updateLifeDisplay() {
                this.elements.life.innerHTML = `<i class="fas fa-heart"></i> 남은 기회: ${this.lives}`;
            }

            async askAI() {
                const userQuery = this.elements.aiInput.value.trim();
                if (!userQuery || this.isAILoading) return;

                const q = this.currentSet[this.currentIndex];
                this.isAILoading = true;
                this.elements.aiAskBtn.disabled = true;
                this.elements.aiResponse.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i> 생각 중...`;
                this.elements.aiResponseContainer.classList.remove('hidden');
                this.elements.aiResponseContainer.style.maxHeight = '500px';

                const systemPrompt = `시멘틱 태그 전문가로서 답변하세요. 한국어로 답변하세요. 절대 정답을 노출하지 말고 힌트 위주로 설명하세요.`;
                try {
                    const response = await this.callGemini(userQuery, systemPrompt);
                    this.elements.aiResponse.innerText = `🤖 AI: ${response}`;
                } catch (error) {
                    this.elements.aiResponse.innerText = "❌ AI 연결 실패.";
                } finally {
                    this.isAILoading = false;
                    this.elements.aiAskBtn.disabled = false;
                }
            }

            async callGemini(query, systemPrompt, retries = 5) {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const payload = {
                    contents: [{ parts: [{ text: query }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                };
                for (let i = 0; i < retries; i++) {
                    try {
                        const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                        const data = await res.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text || "답변 불가";
                    } catch (e) {
                        if (i === retries - 1) throw e;
                        await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                    }
                }
            }

            checkAnswer(selectedIdx, btnElement) {
                const q = this.currentSet[this.currentIndex];
                if (selectedIdx === q.answer) {
                    this.score++;
                    this.showFeedback(true);
                    btnElement.classList.add('correct');
                } else {
                    this.lives--;
                    btnElement.classList.add('wrong');
                    btnElement.disabled = true;
                    if (this.lives > 0) {
                        this.updateLifeDisplay();
                        this.elements.feedbackMsg.innerText = "❌ 오답입니다. 한 번 더 생각해보세요!";
                        this.elements.feedbackMsg.className = "text-red-500 font-bold mb-2";
                        this.elements.feedback.classList.remove('hidden');
                        return;
                    } else {
                        this.showFeedback(false);
                    }
                }
                const btns = this.elements.options.querySelectorAll('button');
                btns.forEach(btn => btn.disabled = true);
            }

            showFeedback(isCorrect) {
                const q = this.currentSet[this.currentIndex];
                this.elements.feedback.classList.remove('hidden', 'bg-emerald-50', 'bg-red-50');
                this.elements.nextBtn.classList.remove('hidden');

                if (isCorrect) {
                    this.elements.feedbackMsg.innerText = "🎉 정답입니다!";
                    this.elements.feedbackMsg.className = "text-emerald-600 font-bold mb-2";
                    this.elements.feedback.classList.add('bg-emerald-50');
                } else {
                    this.elements.feedbackMsg.innerText = `😔 오답입니다. 정답은 [ ${q.options[q.answer]} ]`;
                    this.elements.feedbackMsg.className = "text-red-600 font-bold mb-2";
                    this.elements.feedback.classList.add('bg-red-50');
                }
                this.elements.explanation.innerText = q.explanation;
            }

            nextQuestion() {
                this.currentIndex++;
                if (this.currentIndex < 10) {
                    this.loadQuestion();
                } else {
                    this.showResult();
                }
            }

            showResult() {
                this.elements.quiz.classList.add('hidden');
                this.elements.result.classList.remove('hidden');
                this.elements.finalScore.innerText = this.score * 10;
                this.elements.resultSummary.innerHTML = `
                    <p class="font-bold mb-2">난이도: ${this.selectedDifficulty.toUpperCase()}</p>
                    <p>10문제 중 <span class="text-blue-600 font-bold">${this.score}개</span>를 맞히셨습니다.</p>
                `;
            }
        }

        const quizApp = new SemanticQuiz();
    </script>
</body>
</html>
