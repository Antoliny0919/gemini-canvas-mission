<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6조 데일리 미팅 주제 생성기</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Tailwind dark mode configuration
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; transition: background-color 0.3s ease, color 0.3s ease; }
        
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .category-card {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .category-card.active {
            background-color: #dbeafe; /* blue-100 */
            border-color: #2563eb;     /* blue-600 */
            color: #1e40af;            /* blue-800 */
        }
        
        /* Dark mode active state for cards */
        .dark .category-card.active {
            background-color: #1e40af; /* blue-800 */
            border-color: #60a5fa;     /* blue-400 */
            color: #eff6ff;            /* blue-50 */
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen p-4 md:p-8">
    <div class="max-w-3xl mx-auto">
        <!-- Theme Toggle Button -->
        <div class="flex justify-end mb-4">
            <button id="theme-toggle" class="p-2 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-sm hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
                <i id="theme-icon-light" data-lucide="sun" class="w-5 h-5 text-amber-500 hidden"></i>
                <i id="theme-icon-dark" data-lucide="moon" class="w-5 h-5 text-blue-500"></i>
            </button>
        </div>

        <!-- Header -->
        <header class="mb-10 text-center">
            <div class="inline-flex items-center justify-center p-3 bg-blue-600 rounded-2xl mb-4 shadow-lg shadow-blue-200 dark:shadow-blue-900/20">
                <i data-lucide="layout-grid" class="text-white w-8 h-8"></i>
            </div>
            <h1 class="text-3xl md:text-4xl font-extrabold text-slate-800 dark:text-white tracking-tight">
                6조 데일리 미팅 주제 생성기
            </h1>
            <p class="mt-2 text-slate-500 dark:text-slate-400 font-medium">
                대화하고 싶은 카테고리를 선택한 후 주제를 생성하세요!
            </p>
        </header>

        <!-- Selection View -->
        <div id="selection-view" class="fade-in">
            <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
                <h3 class="text-lg font-bold text-slate-700 dark:text-slate-200 flex items-center gap-2">
                    <i data-lucide="check-square" class="w-5 h-5 text-blue-500"></i>
                    카테고리 선택(<span id="selected-count">0</span>/ 30 )
                </h3>
                <div class="flex gap-2">
                    <button id="select-all-btn" class="text-xs font-bold text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/20 px-3 py-1.5 rounded-lg hover:bg-blue-100 dark:hover:bg-blue-900/40 transition-colors">전체 선택</button>
                    <button id="deselect-all-btn" class="text-xs font-bold text-slate-500 dark:text-slate-400 bg-slate-200 dark:bg-slate-800 px-3 py-1.5 rounded-lg hover:bg-slate-300 dark:hover:bg-slate-700 transition-colors">전체 해제</button>
                </div>
            </div>

            <div id="category-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3 mb-10">
                <!-- Categories will be injected here -->
            </div>

            <div class="sticky bottom-8 flex justify-center">
                <button
                    id="start-btn"
                    disabled
                    class="group flex items-center gap-3 px-10 py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold text-lg transition-all active:scale-95 shadow-xl shadow-blue-200 dark:shadow-blue-900/40 disabled:bg-slate-300 dark:disabled:bg-slate-800 dark:disabled:text-slate-600 disabled:shadow-none disabled:cursor-not-allowed"
                >
                    <i data-lucide="play" class="w-5 h-5 fill-current"></i>
                    선택한 주제 뽑기
                </button>
            </div>
        </div>

        <!-- Result View (Hidden initially) -->
        <div id="result-view" class="hidden fade-in">
            <main class="relative mb-12">
                <div class="bg-white dark:bg-slate-800 rounded-3xl p-8 md:p-12 shadow-xl border border-slate-100 dark:border-slate-700 flex flex-col items-center text-center transition-colors">
                    <div id="result-area" class="w-full min-h-[160px] flex flex-col justify-center items-center">
                        <!-- Result injected here -->
                    </div>

                    <div class="flex flex-col sm:flex-row gap-3 mt-8">
                        <button
                            id="reshuffle-btn"
                            class="flex items-center justify-center gap-3 px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition-all active:scale-95 shadow-lg shadow-blue-100 dark:shadow-blue-900/20"
                        >
                            <i data-lucide="rotate-cw" class="w-5 h-5"></i>
                            다른 주제 뽑기
                        </button>
                        <button
                            id="back-btn"
                            class="flex items-center justify-center gap-3 px-8 py-3 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-slate-600 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-600 rounded-xl font-bold transition-all active:scale-95"
                        >
                            <i data-lucide="arrow-left" class="w-5 h-5"></i>
                            카테고리 재선택
                        </button>
                    </div>
                </div>
                
                <!-- Decorative elements -->
                <div class="absolute -top-4 -left-4 w-12 h-12 bg-yellow-400 rounded-full blur-2xl opacity-20 animate-pulse"></div>
                <div class="absolute -bottom-8 -right-8 w-24 h-24 bg-blue-400 rounded-full blur-3xl opacity-20"></div>
            </main>

            <!-- History in Result View -->
            <section id="history-section" class="bg-slate-100/50 dark:bg-slate-900/50 rounded-3xl p-6 border border-slate-200 dark:border-slate-800 transition-colors">
                <div class="flex items-center gap-2 mb-6">
                    <i data-lucide="history" class="w-5 h-5 text-slate-500 dark:text-slate-400"></i>
                    <h3 class="text-lg font-bold text-slate-700 dark:text-slate-200">오늘의 대화 기록</h3>
                </div>
                <div id="history-list" class="space-y-3">
                    <!-- History items -->
                </div>
            </section>
        </div>

        <footer class="mt-16 pb-8 text-center text-slate-400 text-sm">
            <!-- Footer text removed as requested -->
        </footer>
    </div>

    <script>
        const categoriesData = {
            "운동": ["최근에 시작한 운동이 있나요?", "가장 추천하는 스트레칭 방법은?", "아침 운동 vs 저녁 운동, 선호하는 쪽은?", "운동할 때 듣는 플레이리스트가 있나요?"],
            "음식": ["오늘 점심 메뉴로 가장 먹고 싶은 것은?", "나만 알고 있는 인생 맛집이 있다면?", "요즘 꽂힌 배달 음식 메뉴는?", "죽기 전에 딱 한 가지 음식만 먹을 수 있다면?"],
            "여행": ["가장 기억에 남는 여행지는 어디인가요?", "언젠가 꼭 가보고 싶은 꿈의 나라는?", "여행지에서의 휴식 vs 관광, 당신의 선택은?", "여행 가방에 꼭 챙기는 필수 아이템은?"],
            "개발": ["처음 코딩을 시작하게 된 계기는?", "가장 좋아하는 프로그래밍 언어나 프레임워크는?", "요즘 관심 있게 보고 있는 기술 트렌드는?", "개발하다 막혔을 때 나만의 해결 방법은?"],
            "취미": ["요즘 퇴근 후 가장 즐겁게 하는 일은?", "새롭게 배워보고 싶은 취미가 있나요?", "어린 시절 가장 좋아했던 장난감이나 놀이는?", "주말을 순삭시키는 나만의 취미 생활은?"],
            "영화/드라마": ["최근에 본 영상 중 가장 기억에 남는 것은?", "인생 영화를 하나만 꼽는다면?", "넷플릭스에서 추천하고 싶은 작품은?", "좋아하는 영화 장르와 그 이유는?"],
            "음악": ["지금 바로 생각나는 노래 가사 한 줄은?", "가장 좋아하는 가수나 밴드는?", "비 오는 날 듣기 좋은 노래 추천해주세요.", "나의 인생 노래는 무엇인가요?"],
            "책": ["가장 감명 깊게 읽은 책은?", "최근에 읽고 있는 책이 있나요?", "좋아하는 작가나 문체가 있다면?", "전자책 vs 종이책, 어떤 쪽을 선호하시나요?"],
            "반려동물": ["함께 살고 있는 반려동물이 있나요?", "동물의 언어를 배울 수 있다면 어떤 동물과 대화하고 싶나요?", "가장 좋아하는 동물 사진이나 영상이 있다면?", "반려동물과 함께 가고 싶은 장소는?"],
            "습관": ["꼭 고치고 싶은 사소한 습관이 있나요?", "매일 지키고 있는 나만의 루틴은?", "아침에 일어나서 가장 먼저 하는 일은?", "성공적인 하루를 위해 꼭 필요한 습관은?"],
            "꿈/목표": ["올해 안에 꼭 이루고 싶은 목표 하나는?", "어린 시절 나의 장래희망은 무엇이었나요?", "만약 100억 복권에 당첨된다면 가장 먼저 하고 싶은 일은?", "나의 버킷리스트 1순위는?"],
            "추억": ["가장 기억에 남는 학창 시절 에피소드는?", "어릴 적 가장 맛있게 먹었던 간식은?", "나를 가장 많이 웃게 했던 친구와의 기억은?", "처음으로 혼자 해냈던 일 중 기억나는 것은?"],
            "작업 공간": ["나의 데스크 테리어 아이템 중 가장 아끼는 것은?", "집중이 가장 잘 되는 장소는 어디인가요?", "작업할 때 꼭 필요한 간식이나 음료는?", "나만의 업무 효율 높이는 꿀팁이 있다면?"],
            "건강": ["나만의 영양제 조합이나 건강 관리 비결은?", "요즘 컨디션 조절을 위해 노력하는 것이 있나요?", "하루 중 가장 활력이 넘치는 시간대는?", "숙면을 취하기 위한 나만의 방법은?"],
            "주말 계획": ["이번 주말에 꼭 하고 싶은 일은?", "지난 주말에 가장 즐거웠던 일은?", "완벽한 토요일을 보낸다면 어떤 스케줄인가요?", "주말엔 집순이/집돌이 vs 밖순이/밖돌이?"],
            "생산성": ["내가 사용하는 도구 중 가장 유용한 것은?", "나만의 시간 관리 비법이 있다면?", "업무 중 집중력이 떨어질 때 하는 행동은?", "가장 성취감을 느끼는 순간은 언제인가요?"],
            "게임": ["인생 최고의 게임을 꼽는다면?", "요즘 즐겨 하는 게임이나 관심 있는 게임은?", "보드게임 vs PC게임, 당신의 취향은?", "어릴 때 문방구 앞에서 즐기던 게임이 있나요?"],
            "패션": ["오늘 나의 착장 포인트는?", "가장 좋아하는 패션 아이템은?", "쇼핑할 때 가장 중요하게 생각하는 것은?", "나만의 스타일 워너비가 있나요?"],
            "계절": ["봄, 여름, 가을, 겨울 중 가장 좋아하는 계절은?", "계절이 바뀔 때 가장 먼저 느끼는 변화는?", "겨울철 최고의 간식은 무엇이라고 생각하시나요?", "여름 휴가 vs 겨울 휴가, 당신의 선택은?"],
            "커피/차": ["가장 선호하는 음료 메뉴는?", "내가 좋아하는 카페의 분위기는?", "얼죽아 vs 뜨죽따?", "커피를 마시지 않는다면 선호하는 대안 음료는?"],
            "배움": ["최근에 새로 알게 된 흥미로운 사실이 있나요?", "언젠가 꼭 정복하고 싶은 외국어나 기술은?", "나에게 가장 큰 영감을 주는 사람은?", "강의를 듣는다면 어떤 주제를 듣고 싶나요?"],
            "버킷리스트": ["지금 당장 떠날 수 있다면 어디로 가고 싶나요?", "살면서 꼭 한 번 해보고 싶은 익스트림 스포츠는?", "유명한 사람 중 한 명을 만날 수 있다면 누구를 만나겠습니까?", "나만의 특별한 재능을 가질 수 있다면 어떤 것을 갖고 싶나요?"],
            "도구/장비": ["가장 만족하며 사용 중인 전자기기는?", "키보드나 마우스 등 작업 장비에 대한 취향은?", "다음에 꼭 사고 싶은 IT 기기가 있나요?", "아날로그 도구(수첩, 펜 등)를 사용하시나요?"],
            "언어": ["가장 예쁘다고 생각하는 단어나 문장은?", "자주 사용하는 나만의 말버릇이 있나요?", "제2외국어를 배운다면 어떤 언어를 배우고 싶나요?", "최근에 배운 신조어가 있다면?"],
            "인테리어": ["내 방에서 가장 좋아하는 공간은?", "인테리어 소품 중 가장 추천하는 것은?", "꿈꾸는 집의 모습은 어떤가요?", "미니멀리즘 vs 맥시멀리즘?"],
            "사진": ["갤러리에 있는 사진 중 최근에 찍은 것은 무엇인가요?", "가장 좋아하는 사진 구도나 필터는?", "풍경 사진 찍기 vs 인물 사진 찍기?", "나의 인생샷은 어디서 찍었나요?"],
            "팟캐스트/유튜브": ["구독 중인 채널 중 가장 추천하는 곳은?", "주로 어떤 콘텐츠의 영상을 소비하시나요?", "자기계발용 vs 재미용, 어떤 영상을 더 많이 보시나요?", "나도 유튜브를 시작한다면 어떤 주제로 하고 싶나요?"],
            "성격": ["나를 한 단어로 표현한다면?", "주변 사람들에게 자주 듣는 칭찬은?", "나의 MBTI와 실제 성격이 잘 맞는다고 생각하시나요?", "내가 닮고 싶은 성격의 특징은?"],
            "날씨": ["오늘 날씨에 어울리는 노래는?", "비 오는 날의 감성을 좋아하시나요?", "눈이 올 때 가장 먼저 드는 생각은?", "가장 활동하기 좋다고 생각하는 기온은?"],
            "미래": ["10년 후의 나의 모습은 어떨 것 같나요?", "미래에 발명되었으면 하는 기술이 있나요?", "과거로 돌아갈 수 있다면 언제로 가고 싶나요?", "나중에 어떤 사람으로 기억되고 싶나요?"]
        };

        let selectedCategories = new Set();
        const history = [];
        const allCategoryNames = Object.keys(categoriesData);

        // Elements
        const categoryGrid = document.getElementById('category-grid');
        const selectedCount = document.getElementById('selected-count');
        const startBtn = document.getElementById('start-btn');
        const selectAllBtn = document.getElementById('select-all-btn');
        const deselectAllBtn = document.getElementById('deselect-all-btn');
        const selectionView = document.getElementById('selection-view');
        const resultView = document.getElementById('result-view');
        const resultArea = document.getElementById('result-area');
        const reshuffleBtn = document.getElementById('reshuffle-btn');
        const backBtn = document.getElementById('back-btn');
        const historyList = document.getElementById('history-list');
        const themeToggle = document.getElementById('theme-toggle');
        const themeIconLight = document.getElementById('theme-icon-light');
        const themeIconDark = document.getElementById('theme-icon-dark');

        // Initialize Icons
        lucide.createIcons();

        // Theme Logic
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.documentElement.classList.add('dark');
                themeIconLight.classList.remove('hidden');
                themeIconDark.classList.add('hidden');
            }
        }

        themeToggle.onclick = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            
            if (isDark) {
                themeIconLight.classList.remove('hidden');
                themeIconDark.classList.add('hidden');
            } else {
                themeIconLight.classList.add('hidden');
                themeIconDark.classList.remove('hidden');
            }
        };

        // Render Category Grid
        function initCategoryGrid() {
            categoryGrid.innerHTML = '';
            allCategoryNames.forEach(name => {
                const card = document.createElement('div');
                card.className = "category-card bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-3 text-center text-sm font-semibold text-slate-600 dark:text-slate-300 shadow-sm hover:shadow-md transition-colors";
                card.textContent = name;
                card.onclick = () => toggleCategory(name, card);
                categoryGrid.appendChild(card);
            });
        }

        function toggleCategory(name, element) {
            if (selectedCategories.has(name)) {
                selectedCategories.delete(name);
                element.classList.remove('active');
            } else {
                selectedCategories.add(name);
                element.classList.add('active');
            }
            updateUI();
        }

        function updateUI() {
            selectedCount.textContent = selectedCategories.size;
            startBtn.disabled = selectedCategories.size === 0;
        }

        selectAllBtn.onclick = () => {
            allCategoryNames.forEach(name => selectedCategories.add(name));
            document.querySelectorAll('.category-card').forEach(el => el.classList.add('active'));
            updateUI();
        };

        deselectAllBtn.onclick = () => {
            selectedCategories.clear();
            document.querySelectorAll('.category-card').forEach(el => el.classList.remove('active'));
            updateUI();
        };

        startBtn.onclick = () => {
            selectionView.classList.add('hidden');
            resultView.classList.remove('hidden');
            pickTopic();
        };

        backBtn.onclick = () => {
            resultView.classList.add('hidden');
            selectionView.classList.remove('hidden');
        };

        reshuffleBtn.onclick = pickTopic;

        function pickTopic() {
            const categoriesArray = Array.from(selectedCategories);
            const randomCategory = categoriesArray[Math.floor(Math.random() * categoriesArray.length)];
            const questions = categoriesData[randomCategory];
            const randomQuestion = questions[Math.floor(Math.random() * questions.length)];
            const timestamp = new Date().toLocaleTimeString();

            // Result Display
            resultArea.innerHTML = `
                <div class="fade-in flex flex-col items-center">
                    <span class="inline-block px-4 py-1.5 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-full text-sm font-bold mb-4 uppercase tracking-wider border border-blue-100 dark:border-blue-900/50">
                        ${randomCategory}
                    </span>
                    <h2 class="text-2xl md:text-3xl font-bold text-slate-800 dark:text-white leading-snug px-4">
                        "${randomQuestion}"
                    </h2>
                </div>
            `;

            // Update History
            history.unshift({ category: randomCategory, question: randomQuestion, timestamp });
            if (history.length > 10) history.pop();
            renderHistory();
        }

        function renderHistory() {
            historyList.innerHTML = history.map(item => `
                <div class="flex items-start gap-4 p-4 bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700 transition-colors">
                    <div class="bg-blue-50 dark:bg-blue-900/30 p-2 rounded-lg shrink-0">
                        <i data-lucide="message-square" class="w-4 h-4 text-blue-500 dark:text-blue-400"></i>
                    </div>
                    <div class="flex flex-col">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[10px] font-bold text-blue-500 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30 px-2 py-0.5 rounded uppercase border border-blue-100 dark:border-blue-900/50">${item.category}</span>
                            <span class="text-[10px] text-slate-400 dark:text-slate-500 font-medium">${item.timestamp}</span>
                        </div>
                        <p class="text-sm font-medium text-slate-700 dark:text-slate-300">${item.question}</p>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // Init
        initTheme();
        initCategoryGrid();
    </script>
</body>
</html>
